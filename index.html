<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Wie spät ist es?</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:      #ffffff;
            --text:    #111111;
            --de:      #FF5733;
            --ru:      #0000ff;
            --hint:    #999999;
        }
        :root.dark {
            --bg:      #1a1a2e;
            --text:    #e0e0e0;
            --de:      #ff8060;
            --ru:      #6699ff;
            --hint:    #666688;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100dvh;
            padding: 12px 10px 20px;
            gap: 8px;
            font-family: Tahoma, sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background 0.3s, color 0.3s;
        }

        h1 { font-size: clamp(16px, 5vw, 26px); font-weight: bold; text-align: center; }

        #digitalClock {
            font-size: clamp(22px, 7vw, 40px);
            font-weight: bold; color: var(--ru);
            text-align: center; font-family: Tahoma, sans-serif; letter-spacing: 0.05em;
        }

        #clockWrap {
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        #clock {
            font-size: clamp(16px, 5vw, 24px);
            color: var(--de); font-weight: bold; cursor: pointer;
        }
        #clock:active { opacity: 0.7; }
        #speakBtn {
            font-size: 1.3em; background: none; border: none;
            cursor: pointer; padding: 2px; line-height: 1;
            transition: transform 0.15s;
        }
        #speakBtn.speaking { transform: scale(1.4); }

        #clock-ru { font-size: clamp(14px, 4.2vw, 20px); color: var(--ru); text-align: center; }

        .canvas-wrap {
            width: 100%; max-width: 520px; position: relative; overflow: hidden;
        }
        canvas { display: block; touch-action: none; }

        .hint { font-size: clamp(10px, 3vw, 13px); color: var(--hint); text-align: center; }

        #btnTheme {
            position: fixed; top: 10px; right: 12px; z-index: 200;
            width: 38px; height: 38px; border-radius: 50%; border: none;
            background: #f0f0f0; font-size: 20px; cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            display: flex; align-items: center; justify-content: center;
        }
        :root.dark #btnTheme { background: #2a2a4a; }

        .game-btn {
            padding: 10px 28px; font-size: clamp(14px, 4vw, 18px);
            font-weight: bold; border: none; border-radius: 10px;
            cursor: pointer; transition: background 0.2s;
        }
        #btnStart { background: #2ecc71; color: #fff; }
        #btnStart:active { background: #27ae60; }
        #btnStop  { background: #e74c3c; color: #fff; }
        #btnStop:active  { background: #c0392b; }


    </style>
</head>
<body>

    <button id="btnTheme" onclick="toggleTheme()">🌙</button>

    <!-- Оверлей таймер — поверх всего, не влияет на layout -->
    <div id="gamePhaseWrap" style="display:none;position:fixed;top:0;left:0;width:100%;z-index:100;
         pointer-events:none;flex-direction:column;align-items:center;gap:2px">
        <svg id="svgTimer" width="64" height="64" viewBox="0 0 72 72">
            <circle cx="36" cy="36" r="30" fill="none" stroke="rgba(0,0,0,0.08)" stroke-width="7"/>
            <circle id="timerArc" cx="36" cy="36" r="30" fill="none" stroke="#e74c3c" stroke-width="7"
                stroke-linecap="round" stroke-dasharray="188.5" stroke-dashoffset="0"
                transform="rotate(-90 36 36)"/>
            <text id="timerNum" x="36" y="41" text-anchor="middle"
                font-size="22" font-weight="bold" fill="#e74c3c" font-family="Tahoma,sans-serif">5</text>
        </svg>
    </div>

    <h1>Wie spät ist es?</h1>
    <div id="digitalClock">00:00:00</div>
    <div id="clockWrap">
        <div id="clock"> </div>
        <button id="speakBtn" onclick="speakTime()" title="Произнести">🔊</button>
    </div>
    <div id="clock-ru"> </div>
    <div class="canvas-wrap">
        <canvas id="myCanvas"></canvas>
    </div>
    <p class="hint" id="hintText" style="text-align:center;font-size:clamp(10px,3vw,13px);color:#999">Нажмите на циферблат — остановите стрелки и меняйте время</p>
    <div style="position:relative;width:180px;height:48px;margin:4px auto">
        <button class="game-btn" id="btnStart" onclick="startGame()" style="position:absolute;inset:0;width:100%">▶ Играть</button>
        <button class="game-btn" id="btnStop"  onclick="stopGame()" style="position:absolute;inset:0;width:100%;visibility:hidden">■ Стоп</button>
    </div>
    <a href="editor.html" style="font-size:11px;color:#999;text-decoration:none;margin-top:4px">⚙ Редактор надписей</a>

<script>
    var hour   = 0;
    var minute = 0;
    var second = 0;

    var clockInterval = null;
    var idleTimeout   = null;
    var isClockPaused = false;

    // Константы оригинала (масштабируются при resize)
    const ORIG_W = 600;
    const ORIG_H = 640;
    var clockCenterX, clockCenterY, clockRadius, numbersRadius;

    // ─── Настройки из редактора (localStorage) ───────────────────────────────
    const STORAGE_KEY = 'uhrzeit_clock_texts_v4';
    const ARC_KEY     = 'uhrzeit_arc_settings_v2';

    function loadFromStorage() {
        try {
            var s = localStorage.getItem(STORAGE_KEY);
            if (s) { var p = JSON.parse(s); if (p[0] && p[0].lines) return p; }
        } catch(e) {}
        return null;
    }
    function loadArcFromStorage() {
        try {
            var s = localStorage.getItem(ARC_KEY);
            if (s) return JSON.parse(s);
        } catch(e) {}
        return null;
    }
    // -------------------------------------------------

    // -------------- Отступы -------------------------
    const bezelThickness = 12;
    const padding        = 40;
    const textOffset     = 45;
    // -------------------------------------------------

    // ─── Настройки дуг — читаем из редактора или дефолт ───
    const ARC_DEFAULT = {
        lineWidth:   3,
        arrowSize:   30,
        radiusExtra: 18,
        colorRight: '#FFC04C',
        colorLeft:  '#FF8970',
    };
    const ARC = Object.assign({}, ARC_DEFAULT, loadArcFromStorage());

    // ─── CANVAS RESIZE ───────────────────────────────────────────────────────
    const canvas = document.getElementById('myCanvas');
    const ctx    = canvas.getContext('2d');

    function resizeCanvas() {
        const wrap = canvas.parentElement;
        const w = wrap.clientWidth;
        const h = Math.round(w * ORIG_H / ORIG_W);
        // Размер canvas через атрибуты (логические пиксели)
        canvas.width  = w;
        canvas.height = h;
        // CSS-размер = тот же, чтобы не было масштабирования браузером
        canvas.style.width  = w + 'px';
        canvas.style.height = h + 'px';
        // Геометрия циферблата — фиксированные величины в ORIG-координатах
        clockRadius   = (ORIG_W - 2 * padding) / 2 - 50;
        clockCenterX  = ORIG_W / 2;
        clockCenterY  = ORIG_H / 2 - 20;
        numbersRadius = clockRadius - padding - 15;
        displayCanvas();
    }
    window.addEventListener('resize', resizeCanvas);

    // Масштаб относительно оригинала
    function scale() { return canvas.width / ORIG_W; }

    // ─── DIGITAL CLOCK ───────────────────────────────────────────────────────
    function updateDigitalClock() {
        if (isGameMode) return; // во время игры не перезаписываем
        const now = new Date();
        const h = String(now.getHours()).padStart(2, '0');
        const m = String(now.getMinutes()).padStart(2, '0');
        const s = String(now.getSeconds()).padStart(2, '0');
        document.getElementById('digitalClock').textContent = `${h}:${m}:${s}`;
    }
    function updateGameDigitalClock() {
        const h = String(hour % 12 || 12).padStart(2, '0');
        const m = String(minute).padStart(2, '0');
        document.getElementById('digitalClock').textContent = `${h}:${m}`;
    }
    setInterval(updateDigitalClock, 1000);
    updateDigitalClock();

    // ─── START / STOP ────────────────────────────────────────────────────────
    function startClock() {
        if (!clockInterval) {
            clockInterval = setInterval(function () {
                var d  = new Date();
                hour   = d.getHours();
                minute = d.getMinutes();
                second = d.getSeconds();
                displayCanvas();
                showGermanTime();
            }, 1000);
            isClockPaused = false;
        }
    }

    function stopClock() {
        if (clockInterval) {
            clearInterval(clockInterval);
            clockInterval = null;
            isClockPaused = true;
        }
    }

    function resetIdleTimer() {
        clearTimeout(idleTimeout);
        idleTimeout = setTimeout(startClock, 30000);
    }

    // ─── GERMAN TIME LOGIC (исправленная) ────────────────────────────────────
    var hoursDe = ['zwölf','eins','zwei','drei','vier','fünf','sechs','sieben','acht','neun','zehn','elf'];

    // Фразы для шагов 0..11 (каждые 5 минут)
    var phrasesDe = [
        '',              // 0  — «X Uhr»
        'fünf nach',     // 5
        'zehn nach',     // 10
        'Viertel nach',  // 15
        'zwanzig nach',  // 20
        'fünf vor halb', // 25
        'halb',          // 30
        'fünf nach halb',// 35
        'zwanzig vor',   // 40
        'Viertel vor',   // 45
        'zehn vor',      // 50
        'fünf vor',      // 55
    ];

    // Русский: родительный (5–35 мин) — «пять минут ПЕРВОГО»
    var hoursRuGen = ['двенадцатого','первого','второго','третьего','четвёртого','пятого','шестого','седьмого','восьмого','девятого','десятого','одиннадцатого'];
    // Русский: именительный — для «ровно» и «без»
    var hoursRuNom = ['двенадцать','час','два','три','четыре','пять','шесть','семь','восемь','девять','десять','одиннадцать'];

    var phrasesRu = [
        '',                    // 0  — ровно
        'пять минут',          // 5
        'десять минут',        // 10
        'четверть',            // 15
        'двадцать минут',      // 20
        'двадцать пять минут', // 25
        'половина',            // 30
        'тридцать пять минут', // 35
        'без двадцати',        // 40
        'без четверти',        // 45
        'без десяти',          // 50
        'без пяти',            // 55
    ];

    function hourForm(h) {
        if (h === 1) return '';          // «Ровно час»
        if (h >= 2 && h <= 4) return 'часа';
        return 'часов';
    }

    function showGermanTime() {
        var h12 = hour % 12;
        var m   = minute;
        var textDe, textRu;

        var mStep = Math.floor((m + 2) / 5); // +2 для округления к ближайшим 5
        if (mStep >= 12) mStep = 11;          // 58-59 мин → mStep=11 («fünf vor»)

        // --- НЕМЕЦКИЙ ---
        if (mStep === 0) {
            textDe = 'Es ist ' + hoursDe[h12] + ' Uhr';
        } else if (mStep >= 1 && mStep <= 5) {
            textDe = 'Es ist ' + phrasesDe[mStep] + ' ' + hoursDe[h12];
        } else if (mStep === 6) {
            textDe = 'Es ist halb ' + hoursDe[(h12 + 1) % 12];
        } else if (mStep === 7) {
            textDe = 'Es ist fünf nach halb ' + hoursDe[(h12 + 1) % 12];
        } else {
            textDe = 'Es ist ' + phrasesDe[mStep] + ' ' + hoursDe[(h12 + 1) % 12];
        }

        // --- РУССКИЙ ---
        if (mStep === 0) {
            // Ровно: «Ровно час», «Ровно два часа», «Ровно двенадцать часов»
            var hf = hourForm(h12);
            textRu = 'Ровно ' + hoursRuNom[h12] + (hf ? ' ' + hf : '');

        } else if (mStep >= 1 && mStep <= 7) {
            // 5–35 мин → родительный СЛЕДУЮЩЕГО часа
            // «5 минут девятого», «половина девятого», «35 минут девятого»
            textRu = phrasesRu[mStep] + ' ' + hoursRuGen[(h12 + 1) % 12];

        } else {
            // 40–55 мин → «Без ... + именительный СЛЕДУЮЩЕГО»
            // «Без двадцати час», «Без двадцати два», «Без двадцати двенадцать»
            textRu = phrasesRu[mStep] + ' ' + hoursRuNom[(h12 + 1) % 12];
        }

        document.getElementById('clock').textContent    = textDe;
        document.getElementById('clock-ru').textContent = textRu;
    }

    // ─── ОРИГИНАЛЬНЫЕ ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ (тени) ─────────────────────────
    function applyShadow(context, shadowColor, shadowBlur, shadowOffsetX, shadowOffsetY) {
        context.shadowColor   = shadowColor;
        context.shadowBlur    = shadowBlur;
        context.shadowOffsetX = shadowOffsetX;
        context.shadowOffsetY = shadowOffsetY;
    }
    function clearShadow(context) {
        context.shadowColor   = 'transparent';
        context.shadowBlur    = 0;
        context.shadowOffsetX = 0;
        context.shadowOffsetY = 0;
    }

    // ─── ОРИГИНАЛЬНЫЙ ЦИФЕРБЛАТ (адаптирован под масштаб) ────────────────────

    function drawArrowhead(context, x, y, angle, color) {
        const size = ARC.arrowSize;
        const lineAngle = 20 * (Math.PI / 180);
        context.beginPath();
        context.moveTo(x, y);
        context.lineTo(x - size * Math.cos(angle + lineAngle), y - size * Math.sin(angle + lineAngle));
        context.lineTo(x - size * Math.cos(angle - lineAngle), y - size * Math.sin(angle - lineAngle));
        context.closePath();
        context.fillStyle = color;
        context.fill();
    }

    function getAngles(startHour, endHour) {
        const startAngle = (startHour - 3) * (Math.PI / 6);
        const endAngle   = (endHour   - 3) * (Math.PI / 6);
        return { startAngle, endAngle };
    }

    function drawArcsWithTriangles(context, xCenter, yCenter, radius, arcPad) {
        const right = { startHour: 12.05, endHour: 5,     color: ARC.colorRight };
        const left  = { startHour: 7,     endHour: 11.95, color: ARC.colorLeft  };
        const adjustedRadius = radius + ARC.radiusExtra + bezelThickness;

        [right, left].forEach(({ startHour, endHour, color }) => {
            const { startAngle, endAngle } = getAngles(startHour, endHour);
            context.beginPath();
            context.strokeStyle = color;
            context.lineWidth   = ARC.lineWidth;
            context.arc(xCenter, yCenter, adjustedRadius, startAngle, endAngle);
            context.stroke();

            const triangleX = xCenter + adjustedRadius * Math.cos(endAngle);
            const triangleY = yCenter + adjustedRadius * Math.sin(endAngle);
            const triangleAngle = Math.atan2(triangleY - yCenter, triangleX - xCenter);
            drawArrowhead(context, triangleX, triangleY, triangleAngle + Math.PI / 2, color);
        });
    }

    function drawSectors(context, xCenter, yCenter, radius) {
        const sectors = [
            { startHour: 6,  endHour: 7,  color: 'rgba(255, 242, 226, 0.3)' },
            { startHour: 5,  endHour: 6,  color: 'rgba(255, 187, 165, 0.3)' },
            { startHour: 7,  endHour: 12, color: 'rgba(255, 187, 165, 0.3)' },
            { startHour: 12, endHour: 5,  color: 'rgba(255, 242, 226, 0.3)' },
        ];
        sectors.forEach(({ startHour, endHour, color }) => {
            const { startAngle, endAngle } = getAngles(startHour, endHour);
            context.beginPath();
            context.fillStyle = color;
            context.moveTo(xCenter, yCenter);
            context.arc(xCenter, yCenter, radius, startAngle, endAngle);
            context.lineTo(xCenter, yCenter);
            context.fill();
        });
    }

    function drawLinesFromCenter(context, xCenter, yCenter, radius) {
        context.strokeStyle = '#000000';
        context.lineWidth   = 1 * scale();
        const hours = [7, 6, 5, 0];
        hours.forEach(function(h) {
            const angle = (h - 3) * (Math.PI / 6);
            context.beginPath();
            context.moveTo(xCenter, yCenter);
            context.lineTo(xCenter + radius * Math.cos(angle), yCenter + radius * Math.sin(angle));
            context.stroke();
        });
    }

    function getTextAngle(textHour) {
        return (textHour - 3) * (Math.PI / 6);
    }

    function degreesToRadians(degrees) {
        return degrees * (Math.PI / 180);
    }

    // ═══════════════════════════════════════════════════════════════════
    // КОНФИГУРАЦИЯ НАДПИСЕЙ — редактируй здесь или через редактор
    // textHour  : позиция на циферблате (можно дробное, напр. 5.3)
    // radius_k  : множитель радиуса (1.0 = прямо за безелем)
    // rotDeg    : доворот в градусах (0 = вдоль окружности, -90 = горизонт. справа)
    // color     : цвет надписи
    // ═══════════════════════════════════════════════════════════════════
    // Формат: lines — массив строк, каждая строка — массив {t, c}
    // Читаем из редактора (localStorage) или используем дефолт
    var CLOCK_TEXTS_DEFAULT = [
        { textHour: 11.9, radius_k: 0.96, lines: [[{t:'... ', c:'#888888'}, {t:'Uhr ', c:'#aa2200'}]] },
        { textHour:  1.2, radius_k: 1.00, lines: [[{t:'5 ', c:'#333333'}, {t:'nach', c:'#B85000'}, {t:' ...', c:'#888888'}]] },
        { textHour:  2.2, radius_k: 1.08, lines: [[{t:'10 ', c:'#333333'}, {t:'nach', c:'#B85000'}, {t:' ...', c:'#888888'}]] },
        { textHour:  3.0, radius_k: 1.04, lines: [[{t:'Viertel ', c:'#333333'}], [{t:'nach', c:'#b85000'}, {t:' ...', c:'#888888'}]] },
        { textHour:  3.8, radius_k: 1.10, lines: [[{t:'20 ', c:'#333333'}, {t:'nach', c:'#B85000'}, {t:' ...', c:'#888888'}]] },
        { textHour:  4.7, radius_k: 1.08, lines: [[{t:'5 ', c:'#333333'}, {t:'vor', c:'#B85000'}, {t:' halb', c:'#AA2200'}, {t:' ...', c:'#888888'}]] },
        { textHour:  5.9, radius_k: 0.93, lines: [[{t:'halb', c:'#AA2200'}, {t:' ...', c:'#888888'}]] },
        { textHour:  7.2, radius_k: 1.03, lines: [[{t:'5 ', c:'#333333'}, {t:'nach', c:'#B85000'}, {t:' halb', c:'#AA2200'}, {t:' ...', c:'#888888'}]] },
        { textHour:  8.1, radius_k: 1.04, lines: [[{t:'20 ', c:'#333333'}, {t:'vor', c:'#0055AA'}, {t:' ...', c:'#888888'}]] },
        { textHour:  9.0, radius_k: 1.01, lines: [[{t:'Viertel ', c:'#333333'}], [{t:'vor', c:'#0055aa'}, {t:' ...  ', c:'#888888'}]] },
        { textHour:  9.9, radius_k: 1.06, lines: [[{t:'10 ', c:'#333333'}, {t:'vor', c:'#0055AA'}, {t:' ...', c:'#888888'}]] },
        { textHour: 10.9, radius_k: 0.98, lines: [[{t:'5 ', c:'#333333'}, {t:'vor', c:'#0055AA'}, {t:' ...', c:'#888888'}]] },
    ];
    var CLOCK_TEXTS = loadFromStorage() || CLOCK_TEXTS_DEFAULT;

    // Рисует строку слов с разными цветами
    function drawColoredLine(context, words, cx, cy) {
        var totalW = 0;
        words.forEach(function(w) { totalW += context.measureText(w.t).width; });
        var startX = cx - totalW / 2;
        words.forEach(function(w) {
            var ww = context.measureText(w.t).width;
            context.strokeStyle = 'rgba(255,255,255,0.85)';
            context.lineWidth   = 3;
            context.lineJoin    = 'round';
            context.strokeText(w.t, startX, cy);
            context.fillStyle = w.c;
            context.fillText(w.t, startX, cy);
            startX += ww;
        });
    }

    function drawText(context, xCenter, yCenter, radius, pad) {
        const bezelOuter = radius + 12;
        const gap        = 8;
        const baseR      = bezelOuter + gap;
        const fs         = Math.round(radius * 0.115);
        const lineH      = fs * 1.3;

        context.font         = `bold ${fs}px Arial`;
        context.textAlign    = 'left';
        context.textBaseline = 'middle';
        clearShadow(context);

        CLOCK_TEXTS.forEach(function(cfg) {
            const posAngle = (cfg.textHour - 3) * Math.PI / 6;
            const r        = baseR * cfg.radius_k;
            const x        = xCenter + r * Math.cos(posAngle);
            const y        = yCenter + r * Math.sin(posAngle);
            const totalH   = (cfg.lines.length - 1) * lineH;
            cfg.lines.forEach(function(line, i) {
                drawColoredLine(context, line, x, y - totalH / 2 + i * lineH);
            });
        });
    }

    function drawHand(context, angle, length, xCenter, yCenter, width, color) {
        context.beginPath();
        context.lineWidth   = width * scale();
        context.strokeStyle = color;
        context.lineCap     = 'round';
        context.moveTo(xCenter, yCenter);
        context.lineTo(
            xCenter + length * Math.cos(angle - Math.PI / 2),
            yCenter + length * Math.sin(angle - Math.PI / 2)
        );
        context.stroke();
        context.closePath();
    }


    // ─── TOUCH / CLICK ───────────────────────────────────────────────────────
    function isTouchDevice() {
        return 'ontouchstart' in window || navigator.maxTouchPoints > 0;
    }

    function handleInteraction(clientX, clientY) {
        var rect = canvas.getBoundingClientRect();
        var scX  = ORIG_W / rect.width;
        var scY  = ORIG_H / rect.height;

        // Используем те же глобальные координаты центра, что и displayCanvas
        var x = (clientX - rect.left) * scX - clockCenterX;
        var y = (clientY - rect.top)  * scY - clockCenterY;

        var dist        = Math.sqrt(x * x + y * y);
        var radiusClock = clockRadius - padding;

        if (dist > radiusClock) return;

        stopClock();
        resetIdleTimer();

        var angle   = Math.atan2(y, x);
        var degrees = ((angle * 180 / Math.PI) + 90 + 360) % 360;

        var tolerance           = isTouchDevice() ? 20 : 15;
        var adjustedInnerRadius = 120 - padding - tolerance;
        var adjustedOuterRadius = 220 - padding + tolerance;

        if (dist < adjustedInnerRadius + tolerance) {
            hour = Math.round(degrees / 30) % 12;
        } else if (dist >= adjustedInnerRadius - tolerance && dist <= adjustedOuterRadius + tolerance) {
            minute = Math.round(degrees / 6) % 60;
        }

        displayCanvas();
        showGermanTime();
    }

    canvas.addEventListener('click', function(e) {
        handleInteraction(e.clientX, e.clientY);
    });
    canvas.addEventListener('touchend', function(e) {
        e.preventDefault();
        var t = e.changedTouches[0];
        handleInteraction(t.clientX, t.clientY);
    }, { passive: false });

    // ─── ИГРОВОЙ РЕЖИМ ────────────────────────────────────────────────────────
    var gameInterval  = null;  // интервал таймера
    var gameTimeout   = null;  // таймаут фаз
    var gameCountdown = 0;     // секунды до конца фазы
    var gamePhaseNum  = 0;     // 0=вопрос, 1=ответ
    var isGameMode    = false;

    // ─── SVG ТАЙМЕР ──────────────────────────────────────────────────────────
    var CIRCUMFERENCE = 2 * Math.PI * 30; // 188.5

    function setTimerArc(current, total) {
        var offset = CIRCUMFERENCE * (1 - current / total);
        document.getElementById('timerArc').style.strokeDashoffset = offset;
        document.getElementById('timerNum').textContent = current;
        // цвет по значению
        var color = current >= 4 ? '#2ecc71' : current >= 2 ? '#f39c12' : '#e74c3c';
        document.getElementById('timerArc').style.stroke = color;
        document.getElementById('timerNum').style.fill   = color;
    }

    function setTimerColor(color) { /* не используется */ }

    // Скрываем/показываем элементы нормального режима
    function setGameUI(active) {
        isGameMode = active;
        document.getElementById('clock').style.visibility    = active ? 'hidden' : 'visible';
        document.getElementById('clock-ru').style.visibility = active ? 'hidden' : 'visible';
        document.getElementById('hintText').style.visibility  = active ? 'hidden' : 'visible';
        document.getElementById('btnStart').style.visibility  = active ? 'hidden' : 'visible';
        document.getElementById('btnStop').style.visibility   = active ? 'visible' : 'hidden';
        document.getElementById('gamePhaseWrap').style.display = active ? 'flex' : 'none';
        if (active) {
            var dc = document.getElementById('digitalClock');
            var r  = dc.getBoundingClientRect();
            document.getElementById('gamePhaseWrap').style.paddingTop = (r.bottom + 6) + 'px';
        }
        // Скрываем/показываем надписи и дуги на циферблате через флаг
        displayCanvas();
    }

    // Случайное время с шагом 5 минут
    function randomTime() {
        var h = Math.floor(Math.random() * 12);
        var m = Math.floor(Math.random() * 12) * 5;
        return { h: h, m: m };
    }

    function startGame() {
        stopClock();           // останавливаем реальные часы
        setGameUI(true);
        runQuestion();
    }

    function stopGame() {
        clearInterval(gameInterval);
        clearTimeout(gameTimeout);
        gameInterval = null;
        setGameUI(false);
        // Восстанавливаем реальное время
        var d = new Date();
        hour = d.getHours(); minute = d.getMinutes(); second = d.getSeconds();
        displayCanvas();
        showGermanTime();
        updateDigitalClock(); // восстанавливаем реальное время на электронных часах
        startClock();
    }

    function runQuestion() {
        var t = randomTime();
        hour   = t.h;
        minute = t.m;
        second = 0;

        document.getElementById('clock').style.visibility    = 'hidden';
        document.getElementById('clock-ru').style.visibility = 'hidden';
        document.getElementById('gamePhaseWrap').style.display = 'flex';
        if (document.getElementById('gamePhaseWrap').style.display === 'flex') {
            var dc = document.getElementById('digitalClock');
            var r  = dc.getBoundingClientRect();
            document.getElementById('gamePhaseWrap').style.paddingTop = (r.bottom + 6) + 'px';
        }

        displayCanvas();
        updateGameDigitalClock();

        gameCountdown = 5;
        setTimerArc(gameCountdown, 5);
        clearInterval(gameInterval);
        gameInterval = setInterval(function() {
            gameCountdown--;
            setTimerArc(gameCountdown, 5);
            if (gameCountdown <= 0) {
                clearInterval(gameInterval);
                runAnswer();
            }
        }, 1000);
    }

    function runAnswer() {
        showGermanTime();
        document.getElementById('clock').style.visibility    = 'visible';
        document.getElementById('clock-ru').style.visibility = 'visible';
        // скрываем таймер во время показа ответа
        document.getElementById('gamePhaseWrap').style.display = 'none';
        clearInterval(gameInterval);
        gameInterval = setTimeout(function() {
            runQuestion();
        }, 3000);
    }

    // ─── ОЗВУЧКА ─────────────────────────────────────────────────────────────
    function speakTime() {
        var text = (document.getElementById('clock').textContent || '').trim();
        if (!text || !window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        var utt = new SpeechSynthesisUtterance(text);
        utt.lang = 'de-DE'; utt.rate = 0.85;
        var btn = document.getElementById('speakBtn');
        btn.classList.add('speaking');
        utt.onend = utt.onerror = function() { btn.classList.remove('speaking'); };
        window.speechSynthesis.speak(utt);
    }

    // ─── ТЁМНАЯ ТЕМА ─────────────────────────────────────────────────────────
    function applyTheme(dark) {
        document.documentElement.classList.toggle('dark', dark);
        document.getElementById('btnTheme').textContent = dark ? '☀️' : '🌙';
        displayCanvas();
    }
    function toggleTheme() {
        var dark = !document.documentElement.classList.contains('dark');
        localStorage.setItem('uhrzeit_theme', dark ? 'dark' : 'light');
        applyTheme(dark);
    }
    function loadTheme() {
        var saved = localStorage.getItem('uhrzeit_theme');
        var dark = saved ? saved === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
        applyTheme(dark);
    }

    // ─── АНИМАЦИЯ СТРЕЛОК ────────────────────────────────────────────────────
    // Плавное движение стрелок: храним «визуальные» углы отдельно
    var _dispH = 0, _dispM = 0, _dispS = 0;
    var _rafId = null;

    function _targetH() { return (hour % 12 + minute / 60) * Math.PI / 6; }
    function _targetM() { return minute * Math.PI / 30; }
    function _targetS() { return second * Math.PI / 30; }

    function _shortDiff(from, to) {
        return ((to - from + Math.PI * 3) % (Math.PI * 2)) - Math.PI;
    }

    var _lastT = 0;
    function _rafLoop(ts) {
        var dt = Math.min((ts - _lastT) / 1000, 0.1);
        _lastT = ts;
        var spd = isClockPaused ? 10 : 6;
        _dispH += _shortDiff(_dispH, _targetH()) * Math.min(spd * dt, 1);
        _dispM += _shortDiff(_dispM, _targetM()) * Math.min(spd * dt, 1);
        _dispS += _shortDiff(_dispS, _targetS()) * Math.min(spd * dt, 1);
        _drawFrame();
        _rafId = requestAnimationFrame(_rafLoop);
    }

    // Цвета циферблата с учётом темы
    function _isDark() { return document.documentElement.classList.contains('dark'); }

    function _drawFrame() {
        var s = scale();
        var dark = _isDark();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.save();
        ctx.scale(s, s);

        // Фон циферблата
        var face = ctx.createRadialGradient(
            clockCenterX - clockRadius*0.2, clockCenterY - clockRadius*0.2, clockRadius*0.1,
            clockCenterX, clockCenterY, clockRadius
        );
        face.addColorStop(0, dark ? '#2a2a3e' : '#f5f0e8');
        face.addColorStop(1, dark ? '#1a1a2e' : '#d0c8ba');
        ctx.beginPath(); ctx.arc(clockCenterX, clockCenterY, clockRadius - padding, 0, 2*Math.PI);
        ctx.fillStyle = face; ctx.fill();

        if (!isGameMode) {
            drawArcsWithTriangles(ctx, clockCenterX, clockCenterY, clockRadius - padding, 0);
            drawSectors(ctx, clockCenterX, clockCenterY, clockRadius - padding);
            drawLinesFromCenter(ctx, clockCenterX, clockCenterY, clockRadius - padding);
            drawText(ctx, clockCenterX, clockCenterY, clockRadius, padding);
        }

        // Деления
        var numC = dark ? '#cccccc' : '#000000';
        for (var tm = 0; tm < 60; tm++) {
            ctx.beginPath();
            ctx.strokeStyle = tm%15===0 ? numC : (tm%5===0 ? numC : (dark?'#555577':'#666666'));
            ctx.fillStyle   = tm%15===0 ? '#FFD700' : (dark?'#444466':'#cccccc');
            if (tm%15===0) { applyShadow(ctx,'rgba(0,0,0,0.5)',3,2,2); } else { clearShadow(ctx); }
            if (tm%15===0) {
                ctx.lineWidth = 2;
                var xPM = clockCenterX + numbersRadius * Math.cos(-6*tm*Math.PI/180 + Math.PI/2);
                var yPM = clockCenterY - numbersRadius * Math.sin(-6*tm*Math.PI/180 + Math.PI/2);
                ctx.arc(xPM, yPM, 5, 0, 2*Math.PI, true); ctx.fill(); ctx.stroke();
            } else {
                var ll = tm%5===0?10:6, off = ll===6?3:6;
                var xS = clockCenterX+(numbersRadius-off)*Math.cos(-6*tm*Math.PI/180+Math.PI/2);
                var yS = clockCenterY-(numbersRadius-off)*Math.sin(-6*tm*Math.PI/180+Math.PI/2);
                var xE = clockCenterX+(numbersRadius-off+ll)*Math.cos(-6*tm*Math.PI/180+Math.PI/2);
                var yE = clockCenterY-(numbersRadius-off+ll)*Math.sin(-6*tm*Math.PI/180+Math.PI/2);
                ctx.lineWidth = tm%5===0?3.5:2.5; ctx.moveTo(xS,yS); ctx.lineTo(xE,yE); ctx.stroke();
            }
            ctx.closePath();
        }
        clearShadow(ctx);

        // Цифры
        for (var th = 1; th <= 12; th++) {
            ctx.font='bold 32px Tahoma'; ctx.textAlign='center'; ctx.textBaseline='middle';
            ctx.fillStyle = numC;
            var xT = clockCenterX+(numbersRadius-30)*Math.cos(-30*th*Math.PI/180+Math.PI/2);
            var yT = clockCenterY-(numbersRadius-30)*Math.sin(-30*th*Math.PI/180+Math.PI/2);
            ctx.fillText(th, xT, yT);
        }

        // Стрелки (анимированные)
        var hc = dark ? '#dddddd' : '#000000';
        applyShadow(ctx,'rgba(0,0,0,0.5)',3,3,3);
        drawHand(ctx, _dispH, numbersRadius/1.4, clockCenterX, clockCenterY, 6, hc);
        drawHand(ctx, _dispM, numbersRadius-10,  clockCenterX, clockCenterY, 4, hc);
        if (!isClockPaused) drawHand(ctx, _dispS, numbersRadius-20, clockCenterX, clockCenterY, 2, 'red');
        clearShadow(ctx);

        // Центральная точка
        ctx.save(); applyShadow(ctx,'rgba(0,0,0,0.5)',3,3,3);
        ctx.beginPath(); ctx.strokeStyle='#000'; ctx.fillStyle='#CCC'; ctx.lineWidth=3;
        ctx.arc(clockCenterX, clockCenterY, 6, 0, 2*Math.PI, true); ctx.stroke(); ctx.fill(); ctx.closePath();
        ctx.restore();

        // Безель
        var bIn = clockRadius-padding, bOut = bIn+bezelThickness;
        var bGrad = ctx.createRadialGradient(clockCenterX,clockCenterY,bIn,clockCenterX,clockCenterY,bOut);
        bGrad.addColorStop(0,'#333'); bGrad.addColorStop(0.2,'#707070');
        bGrad.addColorStop(0.5,'#505050'); bGrad.addColorStop(1,'#000');
        ctx.save(); applyShadow(ctx,'rgba(0,0,0,0.5)',5,4,4);
        ctx.beginPath(); ctx.arc(clockCenterX,clockCenterY,bOut-bezelThickness/2,0,2*Math.PI,true);
        ctx.lineWidth=bezelThickness; ctx.strokeStyle=bGrad; ctx.stroke(); ctx.closePath(); ctx.restore();
        ctx.beginPath(); ctx.arc(clockCenterX,clockCenterY,bIn,0,2*Math.PI,true);
        ctx.lineWidth=1; ctx.strokeStyle='#000'; ctx.stroke(); ctx.closePath();
        ctx.beginPath(); ctx.arc(clockCenterX,clockCenterY,bOut,0,2*Math.PI,true);
        ctx.lineWidth=1; ctx.strokeStyle='#000'; ctx.stroke(); ctx.closePath();

        // Стекло
        var gGrad = ctx.createRadialGradient(clockCenterX,clockCenterY,clockRadius/3,clockCenterX,clockCenterY,clockRadius);
        gGrad.addColorStop(0,'rgba(255,255,255,0.35)'); gGrad.addColorStop(0.4,'rgba(200,200,200,0.2)');
        gGrad.addColorStop(0.7,'rgba(50,50,50,0.1)');   gGrad.addColorStop(1,'rgba(0,0,0,0.25)');
        ctx.beginPath(); ctx.arc(clockCenterX,clockCenterY,clockRadius-padding,0,2*Math.PI,true);
        ctx.fillStyle=gGrad; ctx.fill(); ctx.closePath();
        ctx.beginPath();
        var hlG = ctx.createRadialGradient(clockCenterX-clockRadius/3,clockCenterY-clockRadius/3,0,clockCenterX-clockRadius/3,clockCenterY-clockRadius/3,clockRadius/4);
        hlG.addColorStop(0,'rgba(255,255,255,0.9)'); hlG.addColorStop(1,'rgba(255,255,255,0)');
        ctx.fillStyle=hlG; ctx.arc(clockCenterX-clockRadius/3,clockCenterY-clockRadius/3,clockRadius/4,0,2*Math.PI,true); ctx.fill(); ctx.closePath();
        ctx.beginPath(); ctx.ellipse(clockCenterX+clockRadius/6,clockCenterY+clockRadius/4,clockRadius/5,clockRadius/12,Math.PI/4,0,2*Math.PI);
        ctx.fillStyle='rgba(255,255,255,0.3)'; ctx.fill(); ctx.closePath();
        ctx.beginPath();
        var eG = ctx.createRadialGradient(clockCenterX,clockCenterY,clockRadius-padding-5,clockCenterX,clockCenterY,clockRadius-padding);
        eG.addColorStop(0,'rgba(0,0,0,0)'); eG.addColorStop(1,'rgba(0,0,0,0.2)');
        ctx.arc(clockCenterX,clockCenterY,clockRadius-padding,0,2*Math.PI,true); ctx.fillStyle=eG; ctx.fill(); ctx.closePath();
        ctx.beginPath(); ctx.arc(clockCenterX-clockRadius/4,clockCenterY-clockRadius/3,clockRadius/12,0,2*Math.PI,true);
        ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.fill(); ctx.closePath();
        ctx.beginPath(); ctx.ellipse(clockCenterX,clockCenterY+clockRadius/3,clockRadius/3,clockRadius/15,0,0,2*Math.PI);
        ctx.fillStyle='rgba(255,255,255,0.15)'; ctx.fill(); ctx.closePath();

        ctx.restore();
    }

    // displayCanvas теперь просто синхронизирует углы мгновенно (RAF сам перерисует)
    function displayCanvas() {
        _dispH = _targetH();
        _dispM = _targetM();
        _dispS = _targetS();
        if (!_rafId) _drawFrame(); // страховка если RAF ещё не запущен
    }

    window.addEventListener('load', function() {
        resizeCanvas();
        var d  = new Date();
        hour   = d.getHours();
        minute = d.getMinutes();
        second = d.getSeconds();
        _dispH = _targetH(); _dispM = _targetM(); _dispS = _targetS();
        _lastT = performance.now();
        _rafId = requestAnimationFrame(_rafLoop);
        showGermanTime();
        startClock();
        loadTheme();
    });

    // Перечитываем настройки если редактор что-то изменил в localStorage
    window.addEventListener('storage', function(e) {
        if (e.key === STORAGE_KEY || e.key === ARC_KEY) {
            var newTexts = loadFromStorage();
            if (newTexts) CLOCK_TEXTS = newTexts;
            var newArc = loadArcFromStorage();
            if (newArc) Object.assign(ARC, newArc);
            displayCanvas();
        }
    });
</script>
</body>
</html>
